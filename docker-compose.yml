version: "3.9"
services:
  redis:
    image: redis/redis-stack:latest
    ports: ["6379:6379","8001:8001"]

  ai-engine:
    build: ./ai-engine
    ports: ["8000:8000"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_HOST: redis
    depends_on: [redis]

  backend:
    build: ./backend
    ports: ["8080:8080"]
    environment:
      AI_ENGINE_URL: http://ai-engine:8000
      SPRING_DATA_REDIS_HOST: redis
    depends_on: [redis, ai-engine]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
